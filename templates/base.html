<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <title>{{ title }}</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --primary: #0066ff;
            --secondary: #00e3ae;
            --danger: #ff4d4d;
            --background: #f6f8fc;
            --card-bg: #ffffff;
            --text: #1d1d1d;
        }
        body.dark {
            --background: #0e1121;
            --card-bg: #181c2e;
            --text: #e8e8e8;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--background);
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            transition: 0.4s ease-in-out;
        }

        .page-container {
            width: 85%;
            margin: auto;
            padding-top: 40px;
        }

        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 18px;
            box-shadow: 0 0 30px rgba(0,0,0,0.07);
            transition: .4s;
            margin-bottom: 25px;
        }

        .toggle-dark {
            position: fixed;
            right: 30px;
            top: 20px;
            background: var(--primary);
            color: white;
            padding: 10px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
        }

        a { color: var(--primary); }
    </style>

</head>

<body>

<div class="toggle-dark" onclick="toggleDark()">
    Toggle Mode
</div>

<script>
function toggleDark() {
    document.body.classList.toggle("dark");
}
</script>

{% block content %}{% endblock %}

</body>
</html>
